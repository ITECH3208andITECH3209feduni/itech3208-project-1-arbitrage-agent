<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goo-net Vehicles</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5; color: #222; line-height: 1.5;
  }
  header {
    background: #fff; border-bottom: 1px solid #ddd;
    padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .count { font-size: 14px; color: #888; }
  /* ── Layout: sidebar + main ── */
  .layout {
    display: flex; min-height: calc(100vh - 57px);
  }
  .sidebar {
    width: 240px; min-width: 240px;
    background: #fff; border-right: 1px solid #e5e5e5;
    padding: 20px 16px; overflow-y: auto;
  }
  .sidebar h3 {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    color: #888; letter-spacing: 0.5px; margin-bottom: 16px;
  }
  main {
    flex: 1; padding: 24px;
    max-width: calc(100vw - 240px);
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .card {
    background: #fff; border-radius: 8px; border: 1px solid #e5e5e5;
    padding: 16px; display: flex; flex-direction: column; gap: 10px;
    transition: box-shadow 0.15s;
  }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .card h2 { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .price { font-size: 20px; font-weight: 700; color: #c00; }
  .specs { display: flex; flex-wrap: wrap; gap: 4px 12px; font-size: 13px; color: #555; }
  .specs span { white-space: nowrap; }
  .dealer { font-size: 12px; color: #999; }
  .description { font-size: 12px; color: #666; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card a { font-size: 12px; color: #06c; text-decoration: none; word-break: break-all; }
  .card a:hover { text-decoration: underline; }
  .loading, .error { text-align: center; padding: 60px 24px; color: #888; }
  .error { color: #c00; }
  /* ── Filters (sidebar) ── */
  .filters { display: flex; flex-direction: column; gap: 14px; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label {
    font-size: 12px; font-weight: 500; color: #666;
  }
  .filters select, .filters input {
    width: 100%; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px;
    font-size: 13px; background: #fff;
  }
  .filter-reset {
    width: 100%; margin-top: 4px; padding: 6px 0;
    border: 1px solid #ccc; border-radius: 4px;
    background: #fff; font-size: 12px; cursor: pointer; color: #666;
    transition: background 0.15s;
  }
  .filter-reset:hover { background: #f0f0f0; }
  .no-results { grid-column: 1 / -1; text-align: center; padding: 40px; color: #888; }

  /* ── Carousel ── */
  .carousel {
    position: relative; width: 100%; aspect-ratio: 4/3;
    background: #eee; border-radius: 6px; overflow: hidden; cursor: pointer;
  }
  .carousel img {
    width: 100%; height: 100%; object-fit: cover;
    display: block; transition: opacity 0.25s;
  }
  .carousel .placeholder {
    width: 100%; height: 100%; display: flex; align-items: center;
    justify-content: center; color: #bbb; font-size: 13px;
  }
  .carousel .arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255,255,255,0.85); border: none;
    font-size: 16px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; color: #333;
    opacity: 0; transition: opacity 0.2s; z-index: 1;
  }
  .carousel:hover .arrow { opacity: 1; }
  .carousel .arrow.prev { left: 6px; }
  .carousel .arrow.next { right: 6px; }
  .carousel .dots {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; z-index: 1;
  }
  .carousel .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(255,255,255,0.5); transition: background 0.2s;
  }
  .carousel .dot.active { background: #fff; }

  /* ── Lightbox ── */
  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 90vw; max-height: 85vh; object-fit: contain;
    border-radius: 4px; user-select: none;
  }
  .lightbox .lb-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.15); border: none;
    font-size: 24px; cursor: pointer; color: #fff;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .lightbox .lb-arrow:hover { background: rgba(255,255,255,0.3); }
  .lightbox .lb-prev { left: 20px; }
  .lightbox .lb-next { right: 20px; }
  .lightbox .lb-close {
    position: absolute; top: 16px; right: 20px;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.15); border: none;
    font-size: 22px; cursor: pointer; color: #fff;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .lightbox .lb-close:hover { background: rgba(255,255,255,0.3); }
  .lightbox .lb-counter {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #ccc; font-size: 14px;
  }
</style>
</head>
<body>
<header>
  <h1>Vehicles</h1>
  <span class="count"></span>
</header>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <h3>Filters</h3>
    <div class="filters" id="filters">
      <div class="filter-group">
        <label for="search">Search</label>
        <input type="text" id="search" placeholder="Title, dealer...">
      </div>
      <div class="filter-group">
        <label for="fuel">Fuel type</label>
        <select id="fuel"><option value="">Any</option></select>
      </div>
      <div class="filter-group">
        <label for="transmission">Transmission</label>
        <select id="transmission"><option value="">Any</option></select>
      </div>
      <div class="filter-group">
        <label for="drive">Drive type</label>
        <select id="drive"><option value="">Any</option></select>
      </div>
      <div class="filter-group">
        <label for="body">Body type</label>
        <select id="body"><option value="">Any</option></select>
      </div>
      <div class="filter-group">
        <label for="yearMin">Min year</label>
        <input type="number" id="yearMin" placeholder="1990+" min="1990" max="2030">
      </div>
      <button class="filter-reset" id="filterReset">Clear filters</button>
    </div>
  </aside>
  <main>
  <div class="grid" id="grid"></div>
</main>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">&times;</button>
  <button class="lb-arrow lb-prev" id="lbPrev">&lsaquo;</button>
  <img id="lbImg" src="" alt="">
  <button class="lb-arrow lb-next" id="lbNext">&rsaquo;</button>
  <span class="lb-counter" id="lbCounter"></span>
</div>

<script>
// ── State ──
const lb = {
  el: document.getElementById("lightbox"),
  img: document.getElementById("lbImg"),
  counter: document.getElementById("lbCounter"),
  images: [], idx: 0,
};

(function initLightbox() {
  document.getElementById("lbClose").addEventListener("click", lbClose);
  document.getElementById("lbPrev").addEventListener("click", () => lbNav(-1));
  document.getElementById("lbNext").addEventListener("click", () => lbNav(1));
  lb.el.addEventListener("click", (e) => { if (e.target === lb.el) lbClose(); });
  document.addEventListener("keydown", (e) => {
    if (!lb.el.classList.contains("open")) return;
    if (e.key === "Escape") lbClose();
    if (e.key === "ArrowLeft") lbNav(-1);
    if (e.key === "ArrowRight") lbNav(1);
  });
})();

function lbOpen(images, idx) {
  lb.images = images; lb.idx = idx;
  lb.el.classList.add("open");
  document.body.style.overflow = "hidden";
  lbShow();
}
function lbClose() {
  lb.el.classList.remove("open");
  document.body.style.overflow = "";
}
function lbNav(dir) {
  if (!lb.images.length) return;
  lb.idx = (lb.idx + dir + lb.images.length) % lb.images.length;
  lbShow();
}
function lbShow() {
  lb.img.src = lb.images[lb.idx];
  lb.counter.textContent = `${lb.idx + 1} / ${lb.images.length}`;
  document.getElementById("lbPrev").style.visibility = lb.images.length > 1 ? "" : "hidden";
  document.getElementById("lbNext").style.visibility = lb.images.length > 1 ? "" : "hidden";
}

// ── Carousel component (returns HTML string) ──
function carouselHTML(images, uid) {
  if (!images || !images.length) {
    return `<div class="carousel"><div class="placeholder">No images</div></div>`;
  }
  const dots = images.map((_, i) =>
    `<span class="dot${i === 0 ? " active" : ""}" data-dot="${i}"></span>`
  ).join("");
  return `
    <div class="carousel" data-uid="${uid}" data-idx="0">
      <img src="${escAttr(images[0])}" alt="" loading="lazy">
      ${images.length > 1 ? `
        <button class="arrow prev">&lsaquo;</button>
        <button class="arrow next">&rsaquo;</button>
        <div class="dots">${dots}</div>
      ` : ""}
    </div>`;
}

// ── Carousel logic (delegated) ──
function initCarousel(carousel) {
  if (carousel.dataset.bound) return;
  carousel.dataset.bound = "1";
  const img = carousel.querySelector("img");
  const dots = carousel.querySelectorAll(".dot");
  const images = JSON.parse(carousel.dataset.images || "[]");
  if (!img || !images.length) return;

  function set(idx) {
    carousel.dataset.idx = idx;
    img.src = images[idx];
    dots.forEach((d, i) => d.classList.toggle("active", i === idx));
  }

  const prev = carousel.querySelector(".arrow.prev");
  const next = carousel.querySelector(".arrow.next");
  if (prev) prev.addEventListener("click", (e) => {
    e.stopPropagation();
    const idx = (Number(carousel.dataset.idx) - 1 + images.length) % images.length;
    set(idx);
  });
  if (next) next.addEventListener("click", (e) => {
    e.stopPropagation();
    const idx = (Number(carousel.dataset.idx) + 1) % images.length;
    set(idx);
  });
  dots.forEach(d => d.addEventListener("click", (e) => {
    e.stopPropagation();
    set(Number(d.dataset.dot));
  }));

  carousel.addEventListener("click", () => {
    lbOpen(images, Number(carousel.dataset.idx));
  });
}

// ── Main ──
(async () => {
  const grid = document.getElementById("grid");
  const count = document.querySelector(".count");

  function show(html) { grid.innerHTML = html; }

  try {
    const res = await fetch("data/vehicles.json");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const vehicles = await res.json();
    let uidCounter = 0;

    function render(vehs) {
      count.textContent = `${vehs.length} vehicle${vehs.length !== 1 ? "s" : ""}`;
      if (!vehs.length) {
        show('<div class="no-results">No matching vehicles</div>');
        return;
      }
      show(vehs.map(v => {
        const uid = "v" + (uidCounter++);
        return `
        <div class="card">
          ${carouselHTML(v.images, uid)}
          <h2>${esc(v.title)}</h2>
          <div class="price">¥${v.price?.toLocaleString() ?? "—"}</div>
          <div class="specs">
            <span>${v.year ?? "—"}年</span>
            <span>${v.mileage ? (v.mileage/1000).toFixed(1) + "万km" : "—"}</span>
            <span>${esc(v.engineSize) || "—"}</span>
            <span>${esc(v.transmission) || "—"}</span>
            <span>${esc(v.driveType) || "—"}</span>
            <span>${esc(v.fuelType) || "—"}</span>
            <span>${esc(v.color) || "—"}</span>
          </div>
          <div class="dealer">${esc(v.dealer)} · ${esc(v.location)}</div>
          <div class="description">${esc(v.description)}</div>
          <a href="${esc(v.url)}" target="_blank" rel="noopener">View listing →</a>
        </div>
      `}).join(""));
      // Bind carousel logic + stash images
      document.querySelectorAll(".carousel[data-uid]").forEach(c => {
        const uid = c.dataset.uid;
        const card = c.closest(".card");
        if (!card) return;
        const idx = [...grid.children].indexOf(card);
        const v = vehs[idx];
        if (v) {
          c.dataset.images = JSON.stringify(v.images || []);
          initCarousel(c);
        }
      });
    }

    // --- Filtering ---
    const $search = document.getElementById("search");
    const $fuel = document.getElementById("fuel");
    const $transmission = document.getElementById("transmission");
    const $drive = document.getElementById("drive");
    const $body = document.getElementById("body");
    const $yearMin = document.getElementById("yearMin");

    function unique(field) {
      const vals = new Set();
      for (const v of vehicles) if (v[field]) vals.add(v[field]);
      return [...vals].sort();
    }
    function fillSelect(el, values) {
      el.innerHTML = `<option value="">Any</option>` +
        values.map(v => `<option>${esc(v)}</option>`).join("");
    }

    fillSelect($fuel, unique("fuelType"));
    fillSelect($transmission, unique("transmission"));
    fillSelect($drive, unique("driveType"));
    fillSelect($body, unique("bodyType"));

    // Reset button
    document.getElementById("filterReset").addEventListener("click", () => {
      $search.value = "";
      $fuel.value = "";
      $transmission.value = "";
      $drive.value = "";
      $body.value = "";
      $yearMin.value = "";
      filter();
    });

    function filter() {
      const q = $search.value.toLowerCase();
      const year = Number($yearMin.value) || 0;
      const f = (v, field, sel) => !sel.value || v[field] === sel.value;
      const filtered = vehicles.filter(v => {
        if (!f(v, "fuelType", $fuel)) return false;
        if (!f(v, "transmission", $transmission)) return false;
        if (!f(v, "driveType", $drive)) return false;
        if (!f(v, "bodyType", $body)) return false;
        if (year && (!v.year || v.year < year)) return false;
        if (q && !v.title.toLowerCase().includes(q) && !v.dealer.toLowerCase().includes(q)) return false;
        return true;
      });
      render(filtered);
    }

    [$search, $fuel, $transmission, $drive, $body, $yearMin].forEach(el =>
      el.addEventListener("input", filter));

    render(vehicles);
  } catch (e) {
    show(`<div class="error">Failed to load data: ${esc(e.message)}</div>`);
  }
})();

function esc(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escAttr(s) { return String(s ?? "").replace(/&/g,"&amp;").replace(/"/g,"&quot;"); }
</script>
</body>
</html>
